<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicación web de texto a voz">
    <meta name="keywords" content="texto a voz, aplicación web, accesibilidad">
    <meta name="author" content="Sos Anima Developer">
    <title>Text to Speech Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#" aria-label="Inicio">Inicio</a></li>
                <li><a href="#" aria-label="Acerca de">Acerca de</a></li>
                <li><a href="#" aria-label="Contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Text to Speech Web App</h1>
            <p>Esta aplicación web convierte texto en voz</p>
            <form>
                <label for="texto" aria-label="Ingrese el texto a convertir">Ingrese el texto a convertir:</label>
                <textarea id="texto" aria-label="Texto a convertir"></textarea>
                <button type="submit" aria-label="Convertir texto a voz">Convertir texto a voz</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Sos Anima Developer</p>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
